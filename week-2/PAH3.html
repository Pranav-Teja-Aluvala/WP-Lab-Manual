<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Inline CSS</title>
    <style type="text/css">
       .blue{
        color:blue;
       }

       .thick{
        font-size:20px;
       }
    </style>
</head>

<body>
    <p style="color:red;">This is red</p>
    <p class="blue">This is blue</p>
    <p class="thick">This is thick</p> 
</body>
</html>
