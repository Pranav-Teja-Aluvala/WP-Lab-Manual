<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse String</title>
  <style>
    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .container {
        width: 320px;
        padding: 25px;
        text-align: center;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    button:hover {
        opacity: 0.9;
    }

    #result {
        margin-top: 15px;
        font-style: oblique;
        font-size: 16px;
        color: #155ebe;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>Enter your text</h2>
    <input type="text" id="text" placeholder="Enter text"> <br><br>
    <button onclick="check()">Submit</button>
    <div id="result"></div>
  </div>

  <script>
    function check() {
      let text = document.getElementById("text").value;
      let rev = text.split('').reverse().join('');
      document.getElementById("result").innerHTML = "Reversed: " + rev;
    }
  </script>

</body>
</html>
