<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Button</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h5>Click the button to access the tutorial on YouTube:</h5>
        <marquee behavior="alternate" scrollamount="5">
            <button 
                onclick="window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank')" 
                style="padding: 12px 25px; font-size: 16px; font-weight: bold; 
                       background-color: #FF0000; color: white; border: none; 
                       border-radius: 8px; cursor: pointer;">
                Youtube Tutorial
            </button>
        </marquee>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <p style="text-decoration: underline;">This text is underlined</p>
        <p style="text-decoration: line-through;">This text has a line through it</p>
        <p style="text-decoration: overline;">This text has a line above it</p>
        <p style="text-decoration: underline overline;">Both above and below</p>
    </div>
</body>
</html>
