<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static web page with attributes</title>
</head>
<body>
    <p>This is a pargaraph.</p>
    <hr>
    <p>Heading tags..</p>
    <h1>This is main heading</h1>
    <h2>This is sub-main heading</h2>
    <h5>This is h5</h5>
    <h6>This is h6</h6>
    <hr>
    <p>Lists</p>
    <ol type="A">
  <li>Apple</li>
  <li>Banana</li>
    </ol>
     <ul>
  <li>Milk</li>
  <li>Eggs</li>
  <li>Bread</li>
    </ul>
    <hr>
    <p>Textbox and buttons</p>
    <input type="text" placeholder="Enter your name">
    <input type="password" placeholder="Enter password">
    <textarea rows="4" cols="30" placeholder="Type your message"></textarea>
    <br>
    <p style="color: black;">Buttons</p>
    <button>Click Me</button>
</body>
</html>
