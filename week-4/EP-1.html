<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS popup boxes</title>
</head>
<body align="center" style="background-color: cadetblue;">
    <button onclick="showAlert()">Alert Box</button> <br><br>
    <button onclick="showPrompt()">Prompt Button</button>
    <script>
         function showAlert() {
            alert("This is an alert popup box!");
        }

        function showPrompt() {
            var name = prompt("Enter your name:");
            if (name !== null && name !== "") {
                alert("Hello " + name);
            } else {
                alert("No name entered");
            }
        }
    </script>  
</body>
</html>
