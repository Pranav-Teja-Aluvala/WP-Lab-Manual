<!DOCTYPE html>
<html>
<head>
    <title>Fetch using Async/Await</title>
</head>
<body>
    <script>
        async function fetchData() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/postsss/1");
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error("Error:", error);
            }
        }

        fetchData();
    </script>
</body>
</html>
