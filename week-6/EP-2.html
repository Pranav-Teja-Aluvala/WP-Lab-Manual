<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolving a simple promise</title>
</head>
<body>
  <h2>Open the console to see results..</h2>
  <script>
    const myPromise = new Promise((resolve, reject) => {
    const success = true;

    if (success) {
      resolve("Promise resolved successfully!");
    } else {
      reject("Promise rejected.");
    }
   });

    myPromise
    .then((result) => {
      console.log(result);
    })
    .catch((error) => {
      console.log(error);
    });
  </script>
  
</body>
</html>
