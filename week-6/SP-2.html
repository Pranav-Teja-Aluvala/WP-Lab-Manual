<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .palette-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    h3 {
      margin-top: 0;
      color: #333;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      margin: 10px 0;
      font-weight: 500;
    }

    .color-dot {
      height: 20px;
      width: 20px;
      border-radius: 50%;
      margin-right: 10px;
      border: 1px solid #ddd;
    }

    .code-block {
      background: #272822;
      color: #f8f8f2;
      padding: 10px;
      border-radius: 5px;
      font-size: 0.8rem;
      margin-bottom: 15px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="palette-card">
    <h3>Extracted Colors</h3>

    <div class="code-block">
      const [primary, , , secondary] = colors;
    </div>

    <div id="display"></div>
  </div>

  <script>
    const colors = ["Crimson", "Emerald", "Gold", "Azure", "Purple"];

    const [primary, , , secondary] = colors;

    const display = document.getElementById("display");
    display.innerHTML = `
      <div class="item">
        <div class="color-dot" style="background:${primary}"></div>
        Variable 1: ${primary}
      </div>

      <div class="item">
        <div class="color-dot" style="background:${secondary}"></div>
        Variable 2: ${secondary}
      </div>
    `;
  </script>
</body>
</html>
