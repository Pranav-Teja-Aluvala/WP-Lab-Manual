<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your First React Component</title>
</head>
<body>
    <h1 style="color: #007BFF; font-family: Verdana;">WELCOME TO REACT</h1>

    <div>
        <h2>Render React Component</h2>
        <button onclick="display()" style="padding: 10px 20px; background: #61DAFB; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Render Component
        </button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        function display() {
            const component = `
                <div style="background: #61DAFB; color: white; padding: 20px; border-radius: 10px;">
                    <h3>Hello React!</h3>
                    <p>This is my first React component</p>
                    <p>✅ Component rendered successfully!</p>
                </div>
            `;
            document.getElementById("result").innerHTML = component;
        }
    </script>
</body>
</html>
